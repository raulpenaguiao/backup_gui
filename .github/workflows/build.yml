name: Build and Release

on:
  push:
    branches: [main]       # runs tests on every commit to main
    tags: ['v[0-9]*.[0-9]*.[0-9]*']  # builds + releases only on version tags

# Needed to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  # ── Build on each platform in parallel ──────────────────────────────────────
  build:
    name: Build (${{ matrix.platform_dir }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # let all three platforms finish even if one fails
      matrix:
        include:
          - os: ubuntu-latest
            platform_dir: linux
            artifact_name: PigmyBackup-linux
          - os: windows-latest
            platform_dir: windows
            artifact_name: PigmyBackup-windows
          - os: macos-latest
            platform_dir: macos
            artifact_name: PigmyBackup-macos

    steps:
      - uses: actions/checkout@v4

      - name: Write version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: echo "${GITHUB_REF_NAME#v}" > VERSION

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The _tkinter C extension needs the system Tcl/Tk libraries on Linux
      - name: Install Tcl/Tk system libraries (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests -v

      # Output goes directly into dist/<os>/ so the folder structure mirrors
      # the local build scripts: releases/<version>/<os>/PigmyBackup[.exe]
      - name: Build with PyInstaller
        shell: bash
        run: |
          python -m PyInstaller \
            --onefile \
            --windowed \
            --name PigmyBackup \
            --distpath dist/${{ matrix.platform_dir }} \
            --workpath build/_pyinstaller \
            --specpath build \
            backup_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.platform_dir }}/
          if-no-files-found: error

  # ── Collect artifacts and publish a GitHub Release ──────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # only runs when a tag triggered the workflow

    steps:
      - uses: actions/checkout@v4

      - name: Build release metadata
        id: meta
        run: |
          # The tag IS the version (e.g. refs/tags/v2.1.3 → 2.1.3)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION"                    >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}"              >> "$GITHUB_OUTPUT"
          echo "name=Pigmy Backup v${VERSION}"       >> "$GITHUB_OUTPUT"

      # Downloads into artifacts/<artifact_name>/<os>/PigmyBackup[.exe]
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # Rename to add platform suffix before attaching to the release so that
      # all three files have distinct names in the flat GitHub Release asset list
      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          cp artifacts/PigmyBackup-linux/PigmyBackup       release_assets/PigmyBackup-linux
          cp artifacts/PigmyBackup-windows/PigmyBackup.exe  release_assets/PigmyBackup-windows.exe
          cp artifacts/PigmyBackup-macos/PigmyBackup        release_assets/PigmyBackup-macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            **Version:** `${{ steps.meta.outputs.version }}`
            **Commit:** ${{ github.sha }}
            **Branch:** `${{ github.ref_name }}`

            | Platform | File |
            |----------|------|
            | Windows  | `PigmyBackup-windows.exe` |
            | macOS    | `PigmyBackup-macos` |
            | Linux    | `PigmyBackup-linux` |

            > **Windows:** SmartScreen may warn on first launch — click *More info → Run anyway*.
            > **macOS:** If Gatekeeper blocks it, run `xattr -cr PigmyBackup-macos` once in a terminal.
          files: release_assets/*
          fail_on_unmatched_files: true
